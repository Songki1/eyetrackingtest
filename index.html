<!DOCTYPE html>
<html>
  <head>
    <title>My Eye-tracking Experiment</title>
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />

    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0/dist/index.browser.min.js"></script>
    <script src="https://unpkg.com/@jspsych/plugin-image-keyboard-response@2.1.0/dist/index.browser.min.js"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0/dist/index.browser.min.js"></script>
    
    <script src="https://webgazer.cs.brown.edu/webgazer.js"></script>
    <script src="https://unpkg.com/@jspsych/extension-webgazer@2.1.0/dist/index.browser.min.js"></script>
    <script src="https://unpkg.com/@jspsych/plugin-webgazer-calibrate@2.1.0/dist/index.browser.min.js"></script>
  </head>
  <body></body>
  <script>
    /* [실험 엔진 설정] */
    var jsPsych = initJsPsych({
      extensions: [
        {
          type: jsPsychExtensionWebgazer, // 브라우저 버전에서는 이 이름을 씁니다
          params: { 
            show_video_feed: true,
            show_face_overlay: true,
            show_gaze_dot: true,
            auto_initialize: true 
          }
        }
      ],
      on_finish: function() {
        jsPsych.data.displayData();
      }
    });

    var timeline = [];

    /* [1. 안내 및 로딩] */
    var camera_setup = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="font-size: 20px;">
          <p>웹캠을 준비 중입니다. <strong>왼쪽 상단에 카메라 화면이 뜰 때까지 10초만 기다려 주세요.</strong></p>
          <p>얼굴이 보이고 초록색 선이 나타나면 <strong>아무 키나 눌러</strong> 시작하세요.</p>
        </div>
      `
    };
    timeline.push(camera_setup);

    /* [2. 시선 교정] */
    var calibration = {
      type: jsPsychWebgazerCalibrate,
      calibration_points: [[25,25], [25,75], [50,50], [75,25], [75,75]],
      repetitions_per_point: 2
    };
    timeline.push(calibration);

    /* [3. 실험 시작] */
    var welcome = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "교정 완료! 아무 키나 누르면 테스트를 시작합니다."
    };
    timeline.push(welcome);

    /* [4. 테스트 시행] */
    var test = {
      type: jsPsychImageKeyboardResponse,
      stimulus: jsPsych.timelineVariable('stimulus'),
      choices: ['f', 'j'],
      extensions: [{type: jsPsychExtensionWebgazer, params: {targets: ['#jspsych-image-keyboard-response-stimulus']}}],
      data: { task: 'response', correct_response: jsPsych.timelineVariable('correct_response') },
      on_finish: function(data){
        data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
      }
    };

    var test_procedure = {
      timeline: [test],
      timeline_variables: [
        { stimulus: "img/blue.png",  correct_response: 'f'},
        { stimulus: "img/orange.png",  correct_response: 'j'}
      ],
      repetitions: 3,
      randomize_order: true
    };
    timeline.push(test_procedure);

    /* [실행] */
    jsPsych.run(timeline);
  </script>
</html>
